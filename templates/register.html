{% extends "base.html" %}

{% block title %}Register - Data Insighter{% endblock %}

{% block content %}
<div class="container" style="max-width: 400px; margin: 3rem auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: var(--card-shadow);">
    <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--primary-color);">Register</h2>
    <form method="POST" action="/register">
        <!-- FIX #4: CSRF token -->
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div style="margin-bottom: 1rem;">
            <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-color);">Username</label>
            <input type="text" id="username" name="username" required style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1rem;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-color);">Email</label>
            <input type="email" id="email" name="email" required style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1rem;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-color);">Password</label>
            <input type="password" id="password" name="password" required minlength="6" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1rem;">
            <small style="color: var(--text-light);">Minimum 6 characters</small>
        </div>
        <div style="margin-bottom: 1.5rem;">
            <label for="confirm_password" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-color);">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="6" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1rem;">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-color);">Login here</a></p>
</div>
{% endblock %}
