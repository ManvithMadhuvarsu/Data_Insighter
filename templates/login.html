{% extends "base.html" %}

{% block title %}Login - Data Insighter{% endblock %}

{% block content %}
<div class="container" style="max-width: 400px; margin: 3rem auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: var(--card-shadow);">
    <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--primary-color);">Login</h2>
    <form method="POST" action="/login">
        <!-- FIX #4: CSRF token -->
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div style="margin-bottom: 1rem;">
            <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-color);">Username or Email</label>
            <input type="text" id="username" name="username" required style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1rem;">
        </div>
        <div style="margin-bottom: 1.5rem;">
            <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-color);">Password</label>
            <input type="password" id="password" name="password" required style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1rem;">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary-color);">Register here</a></p>
</div>
{% endblock %}
