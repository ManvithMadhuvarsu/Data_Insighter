{% extends "base.html" %}

{% block title %}Register - Data Insighter{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
    <h2 class="auth-title">Register</h2>
    <form method="POST" action="/register" class="auth-form">
        <!-- FIX #4: CSRF token -->
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="auth-field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="auth-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="auth-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6">
            <small class="auth-help">Minimum 6 characters</small>
        </div>
        <div class="auth-field auth-field-spacious">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary auth-submit">Register</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</section>
{% endblock %}
