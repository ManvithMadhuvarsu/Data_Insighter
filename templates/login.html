{% extends "base.html" %}

{% block title %}Login - Data Insighter{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
    <h2 class="auth-title">Login</h2>
    <form method="POST" action="/login" class="auth-form">
        <!-- FIX #4: CSRF token -->
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="auth-field">
            <label for="username">Username or Email</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="auth-field auth-field-spacious">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary auth-submit">Log In</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
</section>
{% endblock %}
